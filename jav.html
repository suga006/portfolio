        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      padding: 20px;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    h1 {
      color: #e94560;
      font-size: 1.8rem;
      margin-bottom: 30px;
    }

    .quote-box {
      background: #1a1a2e;
      border-left: 4px solid #e94560;
      border-radius: 8px;
      padding: 24px;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      margin-bottom: 30px;
    }

    #quote-text {
      color: #eee;
      font-size: 1.2rem;
      line-height: 1.6;
      font-style: italic;
    }

    #quote-author {
      color: #e94560;
      font-size: 0.95rem;
    }

    button {
      padding: 14px 32px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #c73652;
    }
  </style>
<body>
    <div class="card">
        <h1> Quote Generator</h1>

        <div class="quote-box">
            <p id="quote-text">Click the button to get a quote!</p>
            <p id="quote-author">author</p>
        </div>

        <button onclick="getQuote()">New Quote</button>
  </div>

  <script>
    async function getQuote(){
      const quoteText = document.getElementById('quote-text');
      const quoteAuthor = document.getElementById('quote-author');
      
      const response = await fetch('https://dummyjson.com/quotes/random');
      const data = await response.json();
      console.log(data);
      quoteText.textContent = data.quote;
      quoteAuthor.textContent = data.author;

    }
  </script>

</body>
</html>
